services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - JWT_SECRET=change-this-in-production
    volumes:
      - ./ml-models:/app/ml-models
      - ./datasets:/app/datasets
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
